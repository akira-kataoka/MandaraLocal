<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MandaraLocal - 地理情報分析支援</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>MandaraLocal</h1>
    <span class="subtitle">地理情報分析支援システム（ローカル版）</span>
    <div class="header-actions">
      <button id="btn-export-png" class="btn">PNG出力</button>
      <button id="btn-export-svg" class="btn">SVG出力</button>
      <a href="docs/USAGE.html" class="btn-link" target="_blank">使い方</a>
    </div>
  </header>

  <main class="app-main">
    <aside class="sidebar">
      <section class="panel">
        <h2>1. 分析レベル</h2>
        <div class="form-row">
          <label for="select-level">レベル</label>
          <select id="select-level">
            <option value="prefecture">都道府県（47件）</option>
            <option value="municipality">市町村（1,742件）</option>
          </select>
        </div>
        <div class="form-row hint" id="hint-level"></div>
      </section>

      <section class="panel">
        <h2>2. データ読み込み</h2>
        <div class="form-row">
          <button id="btn-load-sample" class="btn btn-primary">サンプルデータを読み込む</button>
        </div>
        <div class="form-row">
          <label for="csv-file" class="btn btn-secondary file-label">CSVファイルを開く</label>
          <input type="file" id="csv-file" accept=".csv,.txt" hidden />
        </div>
        <div class="form-row hint">
          1列目: 都道府県名 または 都道府県コード(1〜47)<br />
          2列目以降: 数値データ
        </div>
        <div id="data-summary" class="data-summary"></div>
      </section>

      <section class="panel" id="panel-field" hidden>
        <h2>2. 表示項目</h2>
        <div class="form-row">
          <label for="select-field">対象列</label>
          <select id="select-field"></select>
        </div>
        <div class="form-row">
          <label for="select-mode">表現方法</label>
          <select id="select-mode">
            <option value="choropleth">階級区分図（塗り分け）</option>
            <option value="symbol">比例シンボル図（円）</option>
            <option value="both">塗り分け+円 を重ね合わせ</option>
          </select>
        </div>
        <div class="form-row" id="row-symbol-size" hidden>
          <label for="input-maxr">円の最大半径</label>
          <input type="number" id="input-maxr" min="8" max="80" value="32" />
        </div>
      </section>

      <section class="panel" id="panel-class" hidden>
        <h2>3. 階級区分</h2>
        <div class="form-row">
          <label for="select-method">区分方法</label>
          <select id="select-method">
            <option value="quantile">等量区分（分位数）</option>
            <option value="equal">等値区分（等間隔）</option>
            <option value="jenks">自然区分（Jenks）</option>
          </select>
        </div>
        <div class="form-row">
          <label for="input-classes">階級数</label>
          <input type="number" id="input-classes" min="2" max="9" value="5" />
        </div>
        <div class="form-row">
          <label for="select-palette">色パレット</label>
          <select id="select-palette">
            <option value="YlOrRd">黄→赤（YlOrRd）</option>
            <option value="Blues">青系（Blues）</option>
            <option value="Greens">緑系（Greens）</option>
            <option value="Reds">赤系（Reds）</option>
            <option value="Purples">紫系（Purples）</option>
            <option value="RdYlBu">青⇄赤（RdYlBu）発散</option>
            <option value="Spectral">スペクトル（Spectral）</option>
            <option value="Viridis">Viridis</option>
          </select>
        </div>
        <div class="form-row inline">
          <label><input type="checkbox" id="chk-reverse" /> 色を反転</label>
        </div>
      </section>

      <section class="panel" id="panel-stats" hidden>
        <h2>4. 基本統計量</h2>
        <table id="stats-table" class="stats-table"></table>
      </section>

      <section class="panel" id="panel-legend" hidden>
        <h2>5. 凡例</h2>
        <div id="legend-container"></div>
      </section>
    </aside>

    <section class="map-wrap">
      <div id="map"></div>
      <div id="tooltip" class="map-tooltip" hidden></div>
      <div id="map-overlay" class="map-overlay" hidden>
        <div class="map-overlay-title" id="overlay-title"></div>
        <div class="map-overlay-legend" id="overlay-legend"></div>
        <div class="map-overlay-footer" id="overlay-footer"></div>
      </div>
    </section>
  </main>

  <!-- Libraries via CDN (ESM-free, work with file:// + local server) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://unpkg.com/simple-statistics@7.8.3/dist/simple-statistics.min.js"></script>
  <script src="https://unpkg.com/chroma-js@2.4.2/chroma.min.js"></script>
  <script src="https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js"></script>

  <!-- App -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
